<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Fit Analyzer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1120;
      --surface: #111827;
      --surface-soft: #1f2937;
      --panel: #111827;
      --panel-soft: #161f38;
      --text: #f8fafc;
      --muted: #94a3b8;
      --border: rgba(148, 163, 184, 0.18);
      --accent: #6366f1;
      --success: #22c55e;
      --danger: #ef4444;
      --badge: rgba(255, 255, 255, 0.1);
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, rgba(99, 102, 241, 0.24), transparent 24%),
                  radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.18), transparent 24%),
                  linear-gradient(180deg, #060914 0%, #0b1120 100%);
      color: var(--text);
    }

    .page {
      width: min(1140px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    .hero {
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.96), rgba(17, 24, 39, 0.9));
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 32px;
      padding: 34px;
      box-shadow: var(--shadow);
      margin-bottom: 28px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2.2rem, 3vw, 3rem);
      line-height: 1.03;
    }

    .hero p {
      margin: 18px 0 0;
      max-width: 760px;
      color: var(--muted);
      line-height: 1.85;
      font-size: 1rem;
    }

    .input-card,
    .result-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 28px;
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      margin-top: 28px;
    }

    .text-input {
      width: 100%;
      min-height: 52px;
      padding: 0 18px;
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.96);
      color: var(--text);
      font-size: 1rem;
    }

    .text-input::placeholder {
      color: rgba(255, 255, 255, 0.42);
    }

    .button {
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, #6366f1, #2563eb);
      color: #fff;
      padding: 0 28px;
      min-width: 150px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .button:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 40px rgba(99, 102, 241, 0.28);
    }

    .button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .status {
      margin-top: 20px;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .result-section {
      display: none;
      margin-top: 32px;
      gap: 20px;
    }

    .result-card {
      display: grid;
      gap: 24px;
    }

    .result-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
    }

    .result-title {
      margin: 0;
      font-size: 1.7rem;
      line-height: 1.1;
    }

    .badge {
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.88rem;
    }

    .badge.apply {
      background: rgba(34, 197, 94, 0.16);
      color: #22c55e;
    }

    .badge.skip {
      background: rgba(239, 68, 68, 0.16);
      color: #ef4444;
    }

    .progress-container {
      display: grid;
      gap: 10px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .progress-track {
      background: rgba(255, 255, 255, 0.08);
      height: 16px;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(148, 163, 184, 0.16);
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(135deg, #34d399, #10b981);
      transition: width 0.4s ease;
    }

    .result-row {
      display: grid;
      gap: 22px;
    }

    .row-title {
      margin: 0 0 10px;
      font-size: 1rem;
      color: #cbd5e1;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .text-block {
      margin: 0;
      color: var(--text);
      line-height: 1.8;
      white-space: pre-wrap;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .tag {
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .tag.match {
      background: rgba(34, 197, 94, 0.18);
      color: #a7f3d0;
      border-color: rgba(34, 197, 94, 0.32);
    }

    .tag.gap {
      background: rgba(239, 68, 68, 0.18);
      color: #fecaca;
      border-color: rgba(239, 68, 68, 0.32);
    }

    .recommendation-grid {
      display: grid;
      gap: 20px;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    }

    .recommendation-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(148, 163, 184, 0.12);
      border-radius: 22px;
      padding: 20px;
    }

    .recommendation-card h3 {
      margin: 0 0 10px;
      font-size: 1rem;
      color: var(--text);
    }

    .recommendation-card ul {
      padding-left: 18px;
      margin: 0;
      color: var(--text);
      line-height: 1.7;
    }

    .hidden {
      display: none !important;
    }

    .error-message {
      color: #f87171;
      margin-top: 14px;
      font-size: 0.95rem;
    }

    @media (max-width: 720px) {
      .form-row {
        grid-template-columns: 1fr;
      }

      .result-header {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <h1>Job Fit Analyzer</h1>
      <p>Paste a job posting URL, then analyze the role for company fit, match strength, and CV recommendations.</p>
      <div class="input-card">
        <div class="form-row">
          <input class="text-input" id="job-url" type="url" placeholder="Paste job posting URL here" />
          <button class="button" id="analyze-button">Analyze</button>
        </div>
        <div class="status" id="status-text">Enter a URL and click Analyze to begin.</div>
        <div class="error-message hidden" id="error-text"></div>
      </div>
    </section>

    <section class="result-section" id="result-section">
      <div class="result-card">
        <div class="result-header">
          <div>
            <h2 class="result-title" id="result-title">Company • Position</h2>
            <p class="text-block" id="result-industry"></p>
          </div>
          <span class="badge" id="decision-badge">DECISION</span>
        </div>

        <div class="progress-container">
          <div class="progress-label"><span>Fit score</span><span id="fit-score-text">0/100</span></div>
          <div class="progress-track">
            <div class="progress-fill" id="fit-progress"></div>
          </div>
        </div>

        <div class="result-row">
          <p class="row-title">Matches</p>
          <div class="tag-list" id="matches-list"></div>
        </div>

        <div class="result-row">
          <p class="row-title">Gaps</p>
          <div class="tag-list" id="gaps-list"></div>
        </div>

        <div class="result-row">
          <p class="row-title">Reasoning</p>
          <p class="text-block" id="reasoning-text"></p>
        </div>

        <div class="recommendation-grid hidden" id="cv-recommendations">
          <div class="recommendation-card">
            <h3>Add to CV</h3>
            <ul id="cv-add-list"></ul>
          </div>
          <div class="recommendation-card">
            <h3>Remove from CV</h3>
            <ul id="cv-remove-list"></ul>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const analyzeButton = document.getElementById('analyze-button');
    const jobUrlInput = document.getElementById('job-url');
    const statusText = document.getElementById('status-text');
    const errorText = document.getElementById('error-text');
    const resultSection = document.getElementById('result-section');
    const resultTitle = document.getElementById('result-title');
    const resultIndustry = document.getElementById('result-industry');
    const decisionBadge = document.getElementById('decision-badge');
    const fitScoreText = document.getElementById('fit-score-text');
    const fitProgress = document.getElementById('fit-progress');
    const matchesList = document.getElementById('matches-list');
    const gapsList = document.getElementById('gaps-list');
    const reasoningText = document.getElementById('reasoning-text');
    const cvRecommendations = document.getElementById('cv-recommendations');
    const cvAddList = document.getElementById('cv-add-list');
    const cvRemoveList = document.getElementById('cv-remove-list');

    function showError(message) {
      errorText.textContent = message;
      errorText.classList.remove('hidden');
    }

    function hideError() {
      errorText.textContent = '';
      errorText.classList.add('hidden');
    }

    function setLoading(active) {
      analyzeButton.disabled = active;
      jobUrlInput.disabled = active;
      statusText.textContent = active ? 'Analyzing the job posting, please wait' : 'Analysis complete.';
    }

    function clearResults() {
      resultSection.style.display = 'none';
      resultIndustry.textContent = '';
      matchesList.innerHTML = '';
      gapsList.innerHTML = '';
      reasoningText.textContent = '';
      cvAddList.innerHTML = '';
      cvRemoveList.innerHTML = '';
      cvRecommendations.classList.add('hidden');
    }

    function renderTags(container, items, type) {
      container.innerHTML = '';
      if (!items || !items.length) {
        const tag = document.createElement('span');
        tag.className = `tag ${type}`;
        tag.textContent = type === 'match' ? 'No matches listed' : 'No gaps listed';
        container.appendChild(tag);
        return;
      }
      items.forEach(item => {
        const tag = document.createElement('span');
        tag.className = `tag ${type}`;
        tag.textContent = item;
        container.appendChild(tag);
      });
    }

    function renderRecommendations(items, listElement) {
      listElement.innerHTML = '';
      if (!items || !items.length) {
        const li = document.createElement('li');
        li.textContent = 'No recommendations available.';
        listElement.appendChild(li);
        return;
      }
      items.forEach(item => {
        const li = document.createElement('li');
        li.textContent = item;
        listElement.appendChild(li);
      });
    }

    async function analyzeJob() {
      hideError();
      clearResults();
      const url = jobUrlInput.value.trim();
      if (!url) {
        showError('Please paste a job posting URL.');
        return;
      }

      setLoading(true);
      try {
        const response = await fetch('/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });

        const data = await response.json();
        if (!response.ok) {
          showError(data.error || 'Analysis failed.');
          statusText.textContent = 'Analysis failed.';
          setLoading(false);
          return;
        }

        const company = data.company || 'Unknown Company';
        const position = data.position || 'Unknown Position';
        const industry = data.industry ? `Industry: ${data.industry}` : '';
        const fitScore = Number.isFinite(data.fit_score) ? data.fit_score : 0;
        const decision = (data.decision || '').toLowerCase();
        const matches = Array.isArray(data.matches) ? data.matches : [];
        const gaps = Array.isArray(data.gaps) ? data.gaps : [];
        const reasoning = data.reasoning || 'No reasoning was returned.';
        const cvRecommendationsPayload = data.cv_recommendations || { add: [], remove: [] };

        resultTitle.textContent = `${company} • ${position}`;
        resultIndustry.textContent = industry;
        fitScoreText.textContent = `${fitScore}/100`;
        fitProgress.style.width = `${Math.max(0, Math.min(100, fitScore))}%`;
        renderTags(matchesList, matches, 'match');
        renderTags(gapsList, gaps, 'gap');
        reasoningText.textContent = reasoning;

        decisionBadge.textContent = decision === 'apply' ? 'APPLY' : 'SKIP';
        decisionBadge.className = `badge ${decision === 'apply' ? 'apply' : 'skip'}`;

        if (decision === 'apply') {
          cvRecommendations.classList.remove('hidden');
          renderRecommendations(cvRecommendationsPayload.add, cvAddList);
          renderRecommendations(cvRecommendationsPayload.remove, cvRemoveList);
        } else {
          cvRecommendations.classList.add('hidden');
        }

        resultSection.style.display = 'block';
        statusText.textContent = 'Analysis complete.';
      } catch (error) {
        showError('Unable to analyze the job posting. Check console for details.');
        statusText.textContent = 'Analysis failed.';
        console.error(error);
      } finally {
        setLoading(false);
      }
    }

    analyzeButton.addEventListener('click', analyzeJob);
    jobUrlInput.addEventListener('keydown', event => {
      if (event.key === 'Enter') {
        event.preventDefault();
        analyzeJob();
      }
    });
  </script>
</body>
</html>
